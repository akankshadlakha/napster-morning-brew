<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Brew</title>
  <style>
    /* ── AVANTT FONT ─────────────────────────────────────
       Place Avantt-Regular.woff2, Avantt-Medium.woff2, and
       Avantt-SemiBold.woff2 in a /fonts folder next to index.html
    ──────────────────────────────────────────────────── */
    @font-face {
      font-family: 'Avantt';
      src: url('fonts/Avantt-Regular.woff2') format('woff2'),
           url('fonts/Avantt-Regular.woff')  format('woff');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Avantt';
      src: url('fonts/Avantt-Medium.woff2') format('woff2'),
           url('fonts/Avantt-Medium.woff')  format('woff');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Avantt';
      src: url('fonts/Avantt-SemiBold.woff2') format('woff2'),
           url('fonts/Avantt-SemiBold.woff')  format('woff');
      font-weight: 600; font-style: normal; font-display: swap;
    }
  </style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:        #FFFFFF;
      --accent-glow:   rgba(255, 255, 255, 0.08);
      --accent-border: rgba(255, 255, 255, 0.22);
      --purple:        #B07FE0;
      --purple-glow:   rgba(176, 127, 224, 0.12);
      --purple-border: rgba(176, 127, 224, 0.30);
      --surface:       rgba(12, 6, 22, 0.82);
      --surface-solid: #0C0616;
      --card-hover:    rgba(255, 255, 255, 0.05);
      --border:        rgba(255, 255, 255, 0.09);
      --text:          #F2F2F2;
      --muted:         #999999;
      --muted-light:   #888888;
    }

    html { height: 100%; }

    body {
      font-family: 'Avantt', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #130920;
      background-image: url('image.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left { display: flex; align-items: center; gap: 13px; }

    .logo-img {
      width: 50px; height: 50px;
      object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 0 12px rgba(200, 100, 255, 0.55));
    }
    .logo-fallback {
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--accent-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: var(--accent); flex-shrink: 0;
    }
    .header-titles h1 {
      font-size: 23px; font-weight: 600;
      color: var(--accent); letter-spacing: -0.3px; line-height: 1.2;
    }
    .header-titles .subtitle { font-size: 14px; font-weight: 400; color: var(--muted); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 16px; }
    #next-refresh  { font-size: 11.5px; color: var(--muted); }
    #last-updated  { font-size: 11.5px; color: var(--muted); }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--accent-border);
      color: var(--accent); padding: 7px 14px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 500; letter-spacing: 0.2px;
      font-family: 'Avantt', sans-serif;
      transition: background 0.15s, border-color 0.15s;
    }
    .refresh-btn:hover  { background: var(--accent-glow); border-color: rgba(255,255,255,0.4); }
    .refresh-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .refresh-btn svg  { transition: transform 0.15s; }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIGEST STRIP ───────────────────────────── */
    #digest-strip {
      flex-shrink: 0;
      background: rgba(6, 2, 14, 0.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      /* Large enough to never clip card content regardless of article length */
      max-height: 1200px;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #digest-strip.collapsed { max-height: 48px; }

    #digest-toggle-row {
      display: flex; align-items: center;
      padding: 0 28px; height: 48px;
      cursor: pointer; gap: 12px; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    #digest-toggle-row:hover { background: rgba(255,255,255,0.015); }

    .digest-day-label {
      font-size: 12.5px; font-weight: 600;
      color: var(--purple); letter-spacing: 0.2px; white-space: nowrap;
    }
    .digest-sep { color: var(--muted); font-size: 13px; }
    .digest-title-label {
      font-size: 13.5px; font-weight: 500;
      color: rgba(255,255,255,0.82); flex: 1; letter-spacing: -0.1px;
    }
    .digest-chevron { color: var(--muted-light); transition: transform 0.3s; flex-shrink: 0; }
    #digest-strip.collapsed .digest-chevron { transform: rotate(-90deg); }

    #digest-content {
      display: flex; gap: 14px;
      padding: 14px 24px 20px;
      overflow-x: auto;
      overflow-y: visible; /* let cards grow to their full height */
    }
    #digest-content::-webkit-scrollbar { height: 3px; }
    #digest-content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1); border-radius: 2px;
    }

    /* ── DIGEST CARD — clean white ── */
    .digest-card {
      min-width: 660px; max-width: 660px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 10px; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 8px;
      /* no fixed height — grows to full content, never clips */
    }

    .digest-card-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .digest-topic-pill {
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.8px; color: #fff;
      background: #7c4dbd; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .digest-source {
      font-size: 10px; color: #999;
      text-align: right; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Headline — largest text on card, very dark */
    .digest-headline {
      font-size: 14px; font-weight: 600; line-height: 1.45;
      letter-spacing: -0.2px;
    }
    .digest-headline a { color: #0d0d0d; text-decoration: none; }
    .digest-headline a:hover { color: #5a2da0; text-decoration: underline; }

    /* Trendjack — left-border callout */
    .digest-trendjack {
      border-left: 2px solid rgba(124, 77, 189, 0.6);
      padding: 2px 0 2px 13px;
    }
    .trendjack-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .trendjack-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #b0b0b0;
    }
    .pillar-badge {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; color: #7c4dbd;
      border: 1px solid rgba(124,77,189,0.4);
      border-radius: 3px; padding: 1px 6px; white-space: nowrap;
    }
    .trendjack-story {
      font-size: 12px; font-weight: 400; color: #444;
      line-height: 1.6; margin-bottom: 6px;
    }
    .trendjack-text {
      font-size: 11.5px; font-weight: 400; color: #2e2e3a;
      line-height: 1.55; font-style: italic;
    }

    /* Talking points */
    .digest-points-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #b0b0b0; margin-bottom: 4px;
    }
    .digest-points-list {
      list-style: none; padding: 0;
      display: flex; flex-direction: column; gap: 5px;
    }
    .digest-points-list li {
      font-size: 11.5px; color: #3a3a4a;
      line-height: 1.5; padding-left: 14px; position: relative;
    }
    .digest-points-list li::before {
      content: '–'; position: absolute; left: 0;
      color: #c0c0c0; font-size: 12px; line-height: 1.55;
    }

    .digest-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 24px 8px; font-size: 12px; color: var(--muted);
    }
    .digest-loading .spinner-sm {
      width: 14px; height: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.75s linear infinite; flex-shrink: 0;
    }
    .digest-empty {
      padding: 24px 8px; font-size: 12px;
      color: var(--muted); font-style: italic;
    }

    /* ── MAIN GRID ───────────────────────────────── */
    main {
      display: grid; grid-template-columns: 1fr 1fr;
      flex: 1;
    }

    .panel {
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: rgba(10, 4, 18, 0.45);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .panel:last-child { border-right: none; }

    /* ── PANEL HEADER ────────────────────────────── */
    .panel-header {
      background: var(--surface);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 22px 14px; flex-shrink: 0;
    }
    /* Match Napster header height to AI panel (which is taller due to topic filter tags) */
    #napster-panel .panel-header { min-height: 95px; display: flex; flex-direction: column; justify-content: center; }
    .panel-title-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title-row h2 {
      font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.1px;
      color: rgba(255,255,255,0.7);
    }
    .article-count {
      font-size: 10.5px; color: var(--muted-light);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 2px 9px; border-radius: 20px;
    }

    /* ── TOPIC FILTER TAGS ───────────────────────── */
    .topic-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .topic-tag {
      font-size: 10px; font-weight: 600;
      color: var(--muted); background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 11px; border-radius: 20px;
      letter-spacing: 0.2px; cursor: pointer; user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .topic-tag:hover:not(.active) {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .topic-tag.active {
      background: rgba(176,127,224,0.18);
      color: var(--purple);
      border-color: rgba(176,127,224,0.45);
      font-weight: 700;
    }

    .panel-header { border-left: 3px solid var(--purple); }

    /* ── ARTICLES SCROLL ─────────────────────────── */
    .articles-scroll { padding: 8px 10px 20px; }

    /* ── ARTICLE CARD ────────────────────────────── */
    .article-card { padding: 16px 14px; border-radius: 8px; transition: background 0.12s; }
    .article-card:hover { background: var(--card-hover); }
    .article-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }

    /* Consistent purple accent across both panels */
    .source-dot  { width: 4px; height: 4px; background: rgba(176,127,224,0.7); border-radius: 50%; flex-shrink: 0; }
    .source-name {
      font-size: 10px; font-weight: 600; color: rgba(176,127,224,0.85);
      text-transform: uppercase; letter-spacing: 0.7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%;
    }

    .sep          { color: var(--muted); font-size: 10px; }
    .article-date { font-size: 10px; color: var(--muted); }

    /* Article title — clear and readable */
    .article-title { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 6px; letter-spacing: -0.15px; }
    .article-title a { color: var(--text); text-decoration: none; transition: color 0.12s; }
    .article-title a:hover { color: rgba(200,170,240,0.9); text-decoration: underline; }

    .article-desc {
      font-size: 12px; font-weight: 400; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-top: 2px;
    }
    .card-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 0 14px; }

    /* ── LOADING ─────────────────────────────────── */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 60px 24px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    .loading-state p { font-size: 12px; color: var(--muted); }

    /* ── ERROR ───────────────────────────────────── */
    .error-state  { padding: 40px 24px; text-align: center; }
    .error-state .error-icon { font-size: 28px; margin-bottom: 10px; }
    .error-state p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .error-state .err-detail {
      margin-top: 8px; font-size: 11px; color: var(--muted-light);
      font-family: monospace;
      background: rgba(255,255,255,0.04);
      padding: 8px 12px; border-radius: 5px;
      border: 1px solid var(--border);
      text-align: left; word-break: break-all;
    }

    /* ── EMPTY ───────────────────────────────────── */
    .empty-state { padding: 60px 24px; text-align: center; }
    .empty-state p { font-size: 12px; color: var(--muted); }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 768px) {

      /* Header */
      header {
        padding: 0 16px;
        height: 70px;
      }
      .logo-img, .logo-fallback { width: 40px; height: 40px; }
      .header-titles h1 { font-size: 19px; }
      .header-titles .subtitle { font-size: 13px; }
      #next-refresh { display: none; }
      #last-updated { font-size: 10px; }
      .refresh-btn { padding: 6px 12px; font-size: 11px; }

      /* Digest strip toggle row */
      #digest-toggle-row { padding: 0 16px; }
      .digest-day-label { font-size: 11px; }
      .digest-title-label { font-size: 12px; }

      /* Digest cards: stack vertically, full width */
      #digest-content {
        flex-direction: column;
        padding: 12px 14px 16px;
        overflow-x: hidden;
        gap: 12px;
      }
      .digest-card {
        min-width: 0;
        max-width: 100%;
        width: 100%;
      }
      /* Give extra max-height room for stacked mobile cards */
      #digest-strip { max-height: 4000px; }

      .digest-headline { font-size: 13px; }
      .trendjack-story { font-size: 11px; }
      .trendjack-text { font-size: 11px; }
      .digest-points-list li { font-size: 11px; }

      /* Main grid: single column */
      main { grid-template-columns: 1fr; }

      .panel { border-right: none; border-bottom: 1px solid var(--border); }
      .panel:last-child { border-bottom: none; }

      /* Panel headers */
      .panel-header { padding: 12px 16px 10px; }
      .panel-title-row h2 { font-size: 9px; }
      .topic-tags { gap: 5px; margin-top: 8px; }
      .topic-tag { font-size: 9px; padding: 3px 9px; }

      /* Articles */
      .articles-scroll { padding: 4px 8px 16px; }
      .article-card { padding: 12px 10px; }
      .article-title { font-size: 13px; }
      .article-desc { font-size: 11px; }
      .source-name { font-size: 9px; }
      .article-date { font-size: 9px; }
    }

    /* Slightly larger phones / landscape tweaks */
    @media (max-width: 480px) {
      .digest-card { padding: 12px 14px; }
      .digest-headline { font-size: 12.5px; }
      .article-title { font-size: 12.5px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<header>
  <div class="header-left">
    <img
      src="napster-logo.png"
      class="logo-img" alt="Napster"
      onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
    />
    <div class="logo-fallback" id="logo-fallback" style="display:none;">N</div>
    <div class="header-titles">
      <h1>Morning Brew</h1>
      <div class="subtitle" id="last-updated">Loading news...</div>
    </div>
  </div>
  <div class="header-right">
    <span id="next-refresh"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M11 6.5A4.5 4.5 0 1 1 6.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6.5 2L9 4M6.5 2L9 0.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<!-- ── DIGEST STRIP ───────────────────────────────── -->
<div id="digest-strip">
  <div id="digest-toggle-row" onclick="toggleDigest()">
    <span class="digest-day-label" id="digest-date-label">—</span>
    <span class="digest-sep">·</span>
    <span class="digest-title-label">Your Digest for the Day</span>
    <svg class="digest-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div id="digest-content">
    <div class="digest-loading">
      <div class="spinner-sm"></div>
      Generating digest…
    </div>
  </div>
</div>

<!-- ── MAIN GRID ──────────────────────────────────── -->
<main>
  <!-- LEFT: Napster News -->
  <section class="panel" id="napster-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>Napster in the News</h2>
        <span class="article-count" id="napster-count">—</span>
      </div>
    </div>
    <div class="articles-scroll" id="napster-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching Napster news…</p>
      </div>
    </div>
  </section>

  <!-- RIGHT: AI & Tech News -->
  <section class="panel" id="ai-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <h2>AI &amp; Technology Intelligence</h2>
        <span class="article-count" id="ai-count">—</span>
      </div>
      <div class="topic-tags" id="topic-tags"><!-- Built by JS --></div>
    </div>
    <div class="articles-scroll" id="ai-articles">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Fetching AI &amp; tech news…</p>
      </div>
    </div>
  </section>
</main>

<script>
  // ── CONFIG ─────────────────────────────────────────────
  const API_KEY    = '8d5681dc34a2f5f27d225492d375879b';
  const GNEWS_BASE = 'https://gnews.io/api/v4/search';
  const REFRESH_MS = 12 * 60 * 60 * 1000;
  const PAGE_SIZE  = 10;

  // ── AI TOPIC FILTER DEFINITIONS ───────────────────────
  const AI_TOPICS = [
    { label: 'All',              query: null },
    { label: 'AI Agents',        query: '"AI agent" OR "AI agents" OR "agentic AI" OR "agentic" OR "autonomous AI" OR "AI-powered agent"' },
    { label: 'AI in Learning',   query: '"AI learning" OR "AI education" OR "AI tutoring" OR "AI training" OR "personalized learning AI"' },
    { label: 'AI in Music',      query: '"AI music" OR "AI-generated music" OR "music AI" OR "AI in music" OR "music industry AI" OR "Spotify AI" OR "streaming music AI" OR "music streaming AI" OR "Apple Music AI" OR "AI artist"' },
    { label: 'The AI Landscape', query: '"artificial intelligence" OR "generative AI" OR "large language model" OR "foundation model" OR "AI startup" OR "AI investment"' },
    { label: 'AI Research',      query: '"state of AI" OR "AI report" OR "AI survey" OR "AI study" OR "AI productivity" OR "AI burnout" OR "AI workforce" OR "enterprise AI adoption" OR "AI trends" OR "AI forecast" OR "McKinsey AI" OR "Deloitte AI" OR "Gartner AI" OR "BCG AI" OR "AI readiness"' },
  ];

  // ── DIGEST: TOPIC CATEGORIES ───────────────────────────
  const DIGEST_TOPICS = [
    { id: 'enterprise', label: 'Enterprise AI',
      keywords: ['enterprise', 'workplace ai', 'workforce ai', 'corporate ai', 'business ai', 'b2b ai', 'enterprise adoption', 'organizational ai', 'ai for business', 'ai at work'] },
    { id: 'physical',   label: 'Physical AI & Hardware',
      keywords: ['robot', 'robotics', 'humanoid', 'physical ai', 'hardware ai', 'embodied ai', 'ambient computing', 'ai chip', 'semiconductor', 'nvidia', 'ai hardware', 'ai device', 'edge ai'] },
    { id: 'ecommerce',  label: 'E-commerce & Retail',
      keywords: ['ecommerce', 'e-commerce', 'retail ai', 'ai shopping', 'consumer ai', 'marketplace ai', 'personalization', 'recommendation ai', 'shopping ai', 'amazon ai'] },
    { id: 'agentic',    label: 'Agentic AI',
      keywords: ['ai agent', 'agentic ai', 'autonomous agent', 'ai workflow', 'multi-agent', 'agent framework', 'ai copilot', 'ai worker', 'ai operator', 'agentic', 'autonomous ai'] },

  // Select the best-matching variant for a given article
  function getPillarContent(pillar, articleText) {
    const raw = articleText.toLowerCase();
    for (const variant of pillar.variants) {
      if (variant.triggers.length > 0 && variant.triggers.some(kw => raw.includes(kw))) {
        return { angle: variant.angle, talkingPoints: variant.talkingPoints };
      }
    }
    const def = pillar.variants[pillar.variants.length - 1];
    return { angle: def.angle, talkingPoints: def.talkingPoints };
  }

  // Returns the best variant of a pillar whose angle hasn't been used yet.
  // Tries trigger-matched variants first, then any unused variant.
  function getUnusedPillarContent(pillar, raw, seenAngles) {
    for (const variant of pillar.variants) {
      if (variant.triggers.length > 0 && variant.triggers.some(kw => raw.includes(kw))) {
        if (!seenAngles.has(variant.angle)) return { angle: variant.angle, talkingPoints: variant.talkingPoints };
      }
    }
    for (const variant of pillar.variants) {
      if (!seenAngles.has(variant.angle)) return { angle: variant.angle, talkingPoints: variant.talkingPoints };
    }
    return null; // all variants for this pillar exhausted
  }

  async function fetchNews(query) {
    const params = new URLSearchParams({
      q: query, sortby: 'publishedAt', lang: 'en', country: 'us',
      max: String(PAGE_SIZE), token: API_KEY
    });
    const apiUrl = `${GNEWS_BASE}?${params}`;
    const url    = ON_LOCALHOST ? apiUrl : `${CORS_PROXY}${encodeURIComponent(apiUrl)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try {
        const e = await r.json();
        msg += ': ' + (e.errors ? Object.values(e.errors).join(', ') : JSON.stringify(e));
      } catch (_) {}
      throw new Error(msg);
    }
    const d = await r.json();
    if (d.errors) throw new Error(Object.values(d.errors).join(', '));
    return d.articles || [];
  }

  // ── GOOGLE NEWS RSS (Napster panel) ───────────────────
  function parseRSSItems(text) {
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    return Array.from(xml.querySelectorAll('item')).map(item => {
      const rawTitle   = item.querySelector('title')?.textContent || '';
      const sourceEl   = item.querySelector('source');
      const sourceName = sourceEl?.textContent?.trim() || '';
      const title = (sourceName && rawTitle.endsWith(' - ' + sourceName))
        ? rawTitle.slice(0, -(sourceName.length + 3))
        : rawTitle;
      const link        = item.getElementsByTagName('link')[0]?.textContent?.trim() || '';
      const rawDesc     = (item.querySelector('description')?.textContent || '').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
      // Google News RSS descriptions are HTML lists of related article links, not article snippets.
      // After stripping HTML they read as "Title Source Title2 Source2…" — essentially the headline
      // repeated. Discard if: too short, starts with the article title, or ends with the source name.
      const titleStart  = title.slice(0, 30).toLowerCase();
      const descLower   = rawDesc.toLowerCase();
      const isGarbled   = rawDesc.length < 80
        || descLower.startsWith(titleStart)
        || rawDesc.trimEnd().endsWith(sourceName);
      const desc        = isGarbled ? '' : rawDesc;
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      return { title, url: link, description: desc, source: { name: sourceName },
               publishedAt: pubDate ? new Date(pubDate).toISOString() : '' };
    });
  }

    const now        = new Date();
    const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
    const googleNewsRss = `https://news.google.com/rss/search?q=%22Napster%22+after:${monthStart}&hl=en-US&gl=US&ceid=US:en`;

    let articles = [];

    // ── Attempt 1: rss2json.com — dedicated RSS→JSON service, no proxy needed ──
    try {
      const r = await fetch(
        `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(googleNewsRss)}`,
        { signal: AbortSignal.timeout(10000) }
      );
      if (r.ok) {
        const d = await r.json();
        if (d.status === 'ok' && Array.isArray(d.items) && d.items.length > 0) {
          articles = d.items.map(item => {
            const rawTitle  = item.title || '';
            // Google News RSS appends " - Source Name" — strip it
            const srcMatch  = rawTitle.match(/ - ([^-]+)$/);
            const sourceName = srcMatch ? srcMatch[1].trim() : (item.author || '');
            const title      = srcMatch ? rawTitle.slice(0, srcMatch.index).trim() : rawTitle;
            return {
              title,
              url: item.link || '',
              description: (item.description || '').replace(/<[^>]*>/g, '').trim(),
              source: { name: sourceName },
              publishedAt: item.pubDate ? new Date(item.pubDate).toISOString() : '',
            };
          });
        }
      }
    } catch (_) {}

    // ── Attempt 2: raw RSS via CORS proxies (fallback) ──
    if (articles.length === 0) {
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      ];
      for (const proxy of proxies) {
        try {
          const r = await fetch(proxy(googleNewsRss), { signal: AbortSignal.timeout(10000) });
          if (r.ok) {
            articles = parseRSSItems(await r.text());
            if (articles.length > 0) break;
          }
        } catch (_) {}
      }
    }

    if (articles.length === 0) throw new Error('Could not reach news sources — try refreshing');

    // Filter to current month only, sort newest → oldest
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    return articles
      .filter(a => a.publishedAt && new Date(a.publishedAt).getTime() >= startOfMonth)
      .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  }

  // ── SORT & DEDUP ───────────────────────────────────────
  function sortByCredibility(articles) {
    return [...articles].sort((a,b) => getSourceScore(b.source?.name) - getSourceScore(a.source?.name));
  }
  function normalizeUrl(url) {
    try {
      const u = new URL(url);
      return (u.origin + u.pathname).replace(/\/$/, '').toLowerCase();
    } catch { return (url || '').toLowerCase().replace(/\/$/, ''); }
  }

  // Compares the first 8 significant words so syndicated copies of the same
  // press release (e.g. GlobeNewswire vs Manila Times) hash to the same key
  // even when publishers add or drop a word at the end of the headline.
  function normalizeTitle(title) {
    return (title || '').toLowerCase()
      .replace(/[^a-z0-9\s]/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .split(' ')
      .slice(0, 8)
      .join(' ');
  }

  function dedup(articles) {
    const seenUrls   = new Set();
    const seenTitles = new Set();
    return articles.filter(a => {
      const urlKey   = a.url ? normalizeUrl(a.url) : '';
      const titleKey = normalizeTitle(a.title);
      if ((urlKey && seenUrls.has(urlKey)) || (titleKey && seenTitles.has(titleKey))) return false;
      if (urlKey)   seenUrls.add(urlKey);
      if (titleKey) seenTitles.add(titleKey);
      return true;
    });
  }

  // ── DIGEST SCORING ─────────────────────────────────────
  // Block stories whose headline is primarily a celebrity/sports/disaster event
  // that only mentions AI or tech in passing. Keep this list tight —
  // over-blocking removes legitimate AI news.
  const DIGEST_BLOCKLIST = [
    'melania', 'kardashian', 'taylor swift', 'beyoncé', 'rihanna',
    'nfl', 'nba', 'fifa', 'premier league', 'super bowl',
    'hurricane', 'earthquake', 'flood', 'wildfire',
  ];

  function scoreArticleForDigest(article) {
    // ── Quality gates ──────────────────────────────────────
    if (!article.url || !article.url.startsWith('http'))   return null;
    if (!article.title || article.title === '[Removed]')   return null;
    if (!article.description || article.description.length < 20) return null;

    const titleLower = (article.title || '').toLowerCase();

    // Block stories whose headline is primarily off-topic
    if (DIGEST_BLOCKLIST.some(kw => titleLower.includes(kw))) return null;

    const raw = (titleLower + ' ' + (article.description || '').toLowerCase());

    // Topic match
    let bestTopic = null, topicScore = 0;
    for (const t of DIGEST_TOPICS) {
      const hits = t.keywords.filter(kw => raw.includes(kw)).length;
      if (hits > topicScore) { topicScore = hits; bestTopic = t; }
    }
    if (!bestTopic || topicScore === 0) return null; // must match a digest topic

    // Pillar match
    let bestPillar = null, pillarScore = 0;
    for (const p of DIGEST_PILLARS) {
      const hits = p.keywords.filter(kw => raw.includes(kw)).length;
      if (hits > pillarScore) { pillarScore = hits; bestPillar = p; }
    }
    // Fallback to topic's natural pillar
    if (!bestPillar || pillarScore === 0) {
      const defaultId = TOPIC_DEFAULT_PILLAR[bestTopic.id] || 1;
      bestPillar = DIGEST_PILLARS.find(p => p.id === defaultId) || DIGEST_PILLARS[0];
    }

    const credibility    = getSourceScore(article.source?.name) / 100;
    const total          = (topicScore * 3) + (pillarScore * 2) + (credibility * 2);
    const pillarContent  = getPillarContent(bestPillar, raw);

    return { article, topic: bestTopic, pillar: bestPillar, pillarContent, score: total, raw };
  }

  function generateDigestPicks() {
    const allArticles = dedup(Object.values(aiCache).flat());

    const scored = allArticles
      .map(scoreArticleForDigest)
      .filter(Boolean)
      .sort((a, b) => b.score - a.score);

    // Max 4 picks — unique title, unique angle, topic variety where possible
    const seenTopics  = new Set();
    const seenTitles  = new Set();
    const seenAngles  = new Set();
    const picks = [];

    function tryAdd(item) {
      const titleKey = normalizeTitle(item.article.title);
      if (seenTitles.has(titleKey)) return false;
      // Resolve a unique angle (cycles variants / pillars if needed)
      const resolved = resolveUniqueContent(item.raw, item.pillar, seenAngles);
      if (!resolved) return false;
      seenTitles.add(titleKey);
      seenAngles.add(resolved.pillarContent.angle);
      picks.push({ ...item, pillar: resolved.pillar, pillarContent: resolved.pillarContent });
      return true;
    }

    // First pass: prefer topic variety
    for (const item of scored) {
      const topic = item.topic.id;
      if (!seenTopics.has(topic)) {
        if (tryAdd(item)) {
          seenTopics.add(topic);
          if (picks.length === 4) break;
        }
      }
    }
    // Second pass: fill remaining slots — title + angle uniqueness only
    if (picks.length < 4) {
      for (const item of scored) {
        if (tryAdd(item)) {
          if (picks.length === 4) break;
        }
      }
    }

    return picks;
  }

  // Breaks text at sentence boundaries so nothing is ever left incomplete.
  // Adds sentences one-by-one until the next would exceed maxChars, then stops.
  function truncateAtSentence(text, maxChars) {
    if (!text) return '';
    const trimmed = text.trim();
    if (trimmed.length <= maxChars) return trimmed;
    // Split into sentences — captures the punctuation as part of each sentence
    const sentences = trimmed.match(/[^.!?]*[.!?]+["']?\s*/g) || [];
    let result = '';
    for (const s of sentences) {
      if ((result + s).trimEnd().length <= maxChars) {
        result += s;
      } else {
        break;
      }
    }
    // If at least one complete sentence fits, return it
    const clean = result.trimEnd();
    if (clean.length > 0) return clean;
    // Edge case: single sentence longer than maxChars — return it whole rather than cutting
    return sentences[0] ? sentences[0].trimEnd() : trimmed;
  }

  function renderDigest(picks) {
    const container = document.getElementById('digest-content');
    document.getElementById('digest-date-label').textContent = getDigestDateLabel();

    if (!picks || picks.length === 0) {
      container.innerHTML = '<p class="digest-empty">No strong candidates found in today\'s articles — check back after the next refresh.</p>';
      return;
    }

    container.innerHTML = picks.map(pick => `
      <div class="digest-card">
        <div class="digest-card-top">
          <span class="digest-topic-pill">${esc(pick.topic.label)}</span>
          <span class="digest-source">${esc(pick.article.source?.name || '')}${pick.article.publishedAt ? ' · ' + timeAgo(pick.article.publishedAt) : ''}</span>
        </div>
        <div class="digest-headline">
          <a href="${esc(pick.article.url)}" target="_blank" rel="noopener noreferrer">${esc(pick.article.title)}</a>
        </div>
        <div class="digest-trendjack">
          <div class="trendjack-header">
            <span class="trendjack-label">Trendjacking Opportunity</span>
            <span class="pillar-badge">${esc(pick.pillar.name)}</span>
          </div>
          ${pick.article.description ? `<p class="trendjack-story">${esc(truncateAtSentence(pick.article.description, 420))}</p>` : ''}
          <p class="trendjack-text">${esc(truncateAtSentence(pick.pillarContent.angle, 400))}</p>
        </div>
        <div>
          <div class="digest-points-label">Talking Points</div>
          <ul class="digest-points-list">
            ${pick.pillarContent.talkingPoints.map(pt => `<li>${esc(pt)}</li>`).join('')}
          </ul>
        </div>
      </div>
    `).join('');
  }

  function toggleDigest() {
    document.getElementById('digest-strip').classList.toggle('collapsed');
  }

  // ── RENDER ARTICLE CARDS ───────────────────────────────
  function renderCards(articles, scrollId, countId) {
    const scroll  = document.getElementById(scrollId);
    const countEl = document.getElementById(countId);
    const valid   = articles.filter(a => a.title && a.title !== '[Removed]' && a.url);

    if (valid.length === 0) {
      scroll.innerHTML = '<div class="empty-state"><p>No articles found.</p></div>';
      countEl.textContent = '0 articles';
      return;
    }
    countEl.textContent = `${valid.length} article${valid.length !== 1 ? 's' : ''}`;
    scroll.innerHTML = valid.map((a, i) => `
      <div class="article-card">
        <div class="article-meta">
          <div class="source-dot"></div>
          <span class="source-name">${esc(a.source?.name || 'Unknown')}</span>
          <span class="sep">·</span>
          <span class="article-date">${timeAgo(a.publishedAt)}</span>
        </div>
        <div class="article-title">
          <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">${esc(a.title)}</a>
        </div>
        ${a.description ? `<p class="article-desc">${esc(a.description)}</p>` : ''}
      </div>
      ${i < valid.length - 1 ? '<div class="card-divider"></div>' : ''}
    `).join('');
  }

  function renderAIArticles() {
    let articles;
    if (activeFilter === 'All') {
      const PER_TOPIC = 7;
      const balanced = Object.values(aiCache).flatMap(items =>
        sortByCredibility(items).slice(0, PER_TOPIC)
      );
      articles = sortByCredibility(dedup(balanced));
    } else {
      articles = sortByCredibility(aiCache[activeFilter] || []);
    }
    renderCards(articles, 'ai-articles', 'ai-count');
  }

  function showLoading(scrollId, msg) {
    document.getElementById(scrollId).innerHTML =
      `<div class="loading-state"><div class="spinner"></div><p>${esc(msg)}</p></div>`;
  }
  function showError(scrollId, countId, err) {
    document.getElementById(scrollId).innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠</div>
        <p>Could not load articles. Check your internet connection and try refreshing.</p>
        <div class="err-detail">${esc(String(err))}</div>
      </div>`;
    document.getElementById(countId).textContent = 'Error';
  }

  // ── FILTER TAGS ────────────────────────────────────────
  function buildFilterTags() {
    const container = document.getElementById('topic-tags');
    container.innerHTML = AI_TOPICS.map(t => `
      <span class="topic-tag ${t.label === 'All' ? 'active' : ''}"
            data-topic="${esc(t.label)}">${esc(t.label)}</span>
    `).join('');
    container.addEventListener('click', e => {
      const tag = e.target.closest('.topic-tag');
      if (!tag) return;
      activeFilter = tag.dataset.topic;
      document.querySelectorAll('.topic-tag').forEach(el =>
        el.classList.toggle('active', el.dataset.topic === activeFilter)
      );
      renderAIArticles();
      document.getElementById('ai-articles').scrollTop = 0;
    });
  }

  // ── LOAD ───────────────────────────────────────────────
  async function loadNapster() {
    showLoading('napster-articles', 'Fetching Napster news…');
    try {
      const articles = await fetchNapsterRSS();
      renderCards(dedup(articles), 'napster-articles', 'napster-count');
    } catch (err) {
      showError('napster-articles', 'napster-count', err);
    }
  }

  async function loadAI() {
    showLoading('ai-articles', 'Fetching AI & tech news…');
    document.getElementById('ai-count').textContent = 'Loading…';
    document.getElementById('digest-content').innerHTML =
      '<div class="digest-loading"><div class="spinner-sm"></div>Generating digest…</div>';

    Object.keys(aiCache).forEach(k => delete aiCache[k]);

    const topicsToFetch = AI_TOPICS.filter(t => t.query !== null);
    const results = await Promise.allSettled(
      topicsToFetch.map(t => fetchNews(t.query).then(articles => ({ label: t.label, articles })))
    );

    let anySuccess = false;
    results.forEach(r => {
      if (r.status === 'fulfilled') {
        aiCache[r.value.label] = r.value.articles;
        anySuccess = true;
      }
    });

    if (!anySuccess) {
      const firstErr = results.find(r => r.status === 'rejected');
      showError('ai-articles', 'ai-count', firstErr?.reason || 'Unknown error');
      document.getElementById('digest-content').innerHTML =
        '<p class="digest-empty">Could not generate digest — news failed to load.</p>';
      return;
    }

    renderAIArticles();

    // Build digest from fetched AI articles
    const picks = generateDigestPicks();
    renderDigest(picks);
  }

  // ── REFRESH ────────────────────────────────────────────
  async function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('spinning');
    document.getElementById('last-updated').textContent = 'Refreshing…';

    await Promise.all([loadNapster(), loadAI()]);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${fmtDate(now)} at ${fmtTime(now)}`;

    nextRefreshAt = Date.now() + REFRESH_MS;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      document.getElementById('next-refresh').textContent =
        fmtCountdown(nextRefreshAt - Date.now());
    }, 60_000);
    document.getElementById('next-refresh').textContent =
      fmtCountdown(nextRefreshAt - Date.now());

    btn.disabled = false;
    btn.classList.remove('spinning');
  }

  // ── INIT ───────────────────────────────────────────────
  document.getElementById('digest-date-label').textContent = getDigestDateLabel();
  buildFilterTags();
  refreshAll();
  autoRefreshTimer = setInterval(refreshAll, REFRESH_MS);
</script>
</body>
